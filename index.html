<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blockbuster Pages</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1021;
        color: #e5e7eb;
      }

      main {
        width: min(42rem, calc(100% - 2rem));
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(17, 24, 39, 0.9);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.75rem;
      }

      p {
        margin-top: 0;
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }

      ul {
        margin: 0;
        padding-left: 1.25rem;
      }

      li + li {
        margin-top: 0.75rem;
      }

      a {
        color: #93c5fd;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Blockbuster GitHub Pages</h1>
      <p>Select a destination:</p>
      <ul>
        <li><a href="./docs/">Documentation: Approaches & Algorithms</a></li>
        <li><a href="./demo/">Interactive Demo App</a></li>
      </ul>
    </main>
  </body>
</html>
